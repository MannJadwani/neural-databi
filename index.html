<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>NeuralBi — AI-Powered Business Intelligence | CSV to Dashboard in Seconds</title>
    <meta name="title" content="NeuralBi — AI-Powered Business Intelligence | CSV to Dashboard in Seconds" />
    <meta name="description" content="Upload any CSV and instantly get beautiful, interactive dashboards powered by AI. NeuralBi turns raw data into charts, KPIs, and insights — no code, no setup, just drag and drop." />
    <meta name="keywords" content="AI business intelligence, CSV to dashboard, AI dashboard generator, data visualization tool, business analytics AI, automated dashboards, data insights, BI tool, NeuralBi, neural bi, spreadsheet to dashboard, AI analytics, no-code BI, self-service analytics" />
    <meta name="author" content="NeuralBi" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://neuralbi.io/" />

    <!-- Theme & Brand -->
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="NeuralBi" />
    <meta name="apple-mobile-web-app-title" content="NeuralBi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Open Graph / Facebook -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://neuralbi.io/" />
    <meta name="twitter:title" content="NeuralBi — AI-Powered Business Intelligence" />
    <meta name="twitter:description" content="Upload any CSV and instantly get beautiful, interactive dashboards powered by AI. Turn raw data into charts, KPIs, and insights in seconds." />
    <meta name="twitter:image" content="https://neuralbi.io/og-image.png" />
    <meta name="twitter:image:alt" content="NeuralBi — Drop a CSV, get a dashboard instantly with AI" />

    <!-- Performance Hints -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "NeuralBi",
      "url": "https://neuralbi.io",
      "logo": "https://neuralbi.io/logo.png",
      "description": "AI-powered business intelligence platform that transforms CSV data into interactive dashboards instantly.",
      "sameAs": []
    }
    </script>

    <!-- JSON-LD Structured Data: SoftwareApplication (for rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NeuralBi",
      "url": "https://neuralbi.io",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Upload any CSV and get AI-generated interactive dashboards with charts, KPIs, and data insights in seconds. No code required.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free to start — upload your first CSV and get a dashboard instantly"
      },
      "featureList": [
        "AI-powered dashboard generation from CSV files",
        "10+ interactive chart types including bar, line, pie, scatter, and KPI cards",
        "Natural language data analysis — ask AI questions about your data",
        "One-click public dashboard sharing",
        "Real-time data visualization",
        "Automatic pattern and trend detection",
        "Export dashboards as PDF"
      ],
      "screenshot": "https://neuralbi.io/og-image.png"
    }
    </script>

    <!-- JSON-LD Structured Data: FAQPage (AEO — Answer Engine Optimization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is NeuralBi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NeuralBi is an AI-powered business intelligence tool that lets you upload any CSV file and instantly generates beautiful, interactive dashboards with charts, KPIs, and data-driven insights — no coding or setup required."
          }
        },
        {
          "@type": "Question",
          "name": "How do I create a dashboard from a CSV file?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Simply drag and drop your CSV file onto NeuralBi's upload area, optionally add custom instructions like 'focus on revenue trends', and click Generate Dashboard. AI analyzes your data and builds an interactive dashboard with the most relevant charts and insights in seconds."
          }
        },
        {
          "@type": "Question",
          "name": "What chart types does NeuralBi support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NeuralBi supports over 10 chart types including bar charts, line charts, area charts, pie charts, scatter plots, KPI cards, treemaps, radar charts, and more. The AI automatically selects the best chart types for your data."
          }
        },
        {
          "@type": "Question",
          "name": "Can I share my dashboards publicly?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. NeuralBi lets you share any dashboard with a public link. Recipients can view the interactive charts, explore the underlying data, and even ask the AI questions about the dashboard — all without needing an account."
          }
        },
        {
          "@type": "Question",
          "name": "Is NeuralBi free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NeuralBi offers a free tier that lets you upload CSV files and generate AI-powered dashboards. You can get started immediately without a credit card."
          }
        },
        {
          "@type": "Question",
          "name": "How is NeuralBi different from traditional BI tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unlike traditional BI tools like Tableau or Power BI that require manual chart configuration and SQL knowledge, NeuralBi uses AI to automatically analyze your data and generate the most relevant visualizations. What takes hours in traditional tools takes seconds with NeuralBi."
          }
        }
      ]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction (for sitelinks search box in Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NeuralBi",
      "url": "https://neuralbi.io",
      "description": "AI-powered business intelligence — upload CSV, get dashboards instantly",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://neuralbi.io/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
